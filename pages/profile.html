<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Student Admission System</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f4f8ff; padding-top: 86px; }
    .profile-card { max-width: 900px; margin: 2rem auto; border: 0; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .profile-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #e7eefb; }
  </style>
</head>
<body class="profile-page">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Student Admission System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="../schools.html">Schools</a></li>
          <li class="nav-item"><a class="nav-link" href="admission.html">Admission</a></li>
          <li class="nav-item"><a class="nav-link" id="dashboardLink" href="student-dashbord.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" id="profileLink" href="profile.html">Profile</a></li>
         
        </ul>
      </div>
      <button id="loginBtn" class="btn btn-outline-light">Login</button>
    </div>
  </nav>

  <div class="container">
    <div class="card profile-card">
      <div class="card-body p-4 p-md-5">
        <div class="d-flex flex-column flex-md-row align-items-center gap-4">
          <img id="profilePhoto" class="profile-photo" src="https://via.placeholder.com/140x140.png?text=Profile" alt="Profile Photo" />
          <div>
            <h3 class="mb-1">My Profile</h3>
            <p class="text-muted mb-0">Manage your details and keep your account up to date.</p>
          </div>
        </div>

        <hr class="my-4" />

        <form id="profileForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input id="profileName" type="text" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input id="profileEmail" type="email" class="form-control" disabled />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input id="profilePhone" type="tel" class="form-control" placeholder="Enter phone number" />
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Update Profile</button>
          </div>
        </form>
        <div id="profileMsg" class="d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script.js"></script>
</body>
</html>
